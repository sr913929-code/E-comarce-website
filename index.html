<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07); --accent: #c9a96e; --accent2: #e8c992;
    --text: #f0ede8; --muted: #7a7672; --danger: #e05c5c; --info: #5c9ee0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #1a1508 0%, #0a0a0a 70%);
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
    top: -100px; right: -100px; pointer-events: none;
  }
  body::after {
    content: ''; position: absolute; width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 70%);
    bottom: -80px; left: -80px; pointer-events: none;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px; width: 420px;
    position: relative; z-index: 1;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  .auth-logo {
    font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900;
    color: var(--accent); letter-spacing: 6px; text-align: center; margin-bottom: 8px;
  }
  .auth-tagline {
    text-align: center; color: var(--muted); font-size: 12px;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 36px;
  }
  .tab-row {
    display: flex; gap: 0; margin-bottom: 28px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
  }
  .tab-btn {
    flex: 1; padding: 10px; border: none; background: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    border-radius: 8px; cursor: pointer; transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #000; font-weight: 600; }
  .role-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .role-btn {
    flex: 1; padding: 10px; border: 1px solid var(--border);
    background: none; color: var(--muted); border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all .2s;
  }
  .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(201,169,110,0.08); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .auth-hint { font-size: 11px; color: var(--muted); margin-bottom: 20px; text-align: center; line-height: 1.7; }
  .auth-hint span { color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 14px; background: var(--accent); color: #000; border: none;
    border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all .2s;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .auth-error {
    background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--danger);
    margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">LUXE</div>
  <div class="auth-tagline">Premium E-Commerce</div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Register</button>
  </div>
  <div class="role-row">
    <button class="role-btn active" id="role-user" onclick="selectRole('user')">🛍️ Customer</button>
    <button class="role-btn" id="role-admin" onclick="selectRole('admin')">⚙️ Admin</button>
  </div>
  <div id="auth-error" class="auth-error"></div>
  <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" /></div>
  <div class="field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleAuth()" /></div>
  <div id="register-fields" style="display:none;">
    <div class="field"><label>Full Name</label><input type="text" id="auth-name" placeholder="Your name" /></div>
  </div>
  <div class="auth-hint">
    Demo Admin: <span>admin@luxe.com / admin123</span><br>
    Demo User: <span>user@luxe.com / user123</span>
  </div>
  <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>
</div>

<script src="shared.js"></script>
<script>
  // Redirect if already logged in
  const existing = getCurrentUser();
  if (existing) window.location.href = existing.role === 'admin' ? 'admin.html' : 'store.html';

  let authTab = 'login';
  let selectedRole = 'user';

  function switchTab(tab) {
    authTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
    document.getElementById('register-fields').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('auth-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-user').classList.toggle('active', role === 'user');
    document.getElementById('role-admin').classList.toggle('active', role === 'admin');
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-password').value;
    if (!email || !pass) { showError('Please fill in all fields.'); return; }

    const state = getState();

    if (authTab === 'login') {
      const user = state.users.find(u => u.email === email && u.password === pass);
      if (!user) { showError('Invalid credentials.'); return; }
      if (user.role !== selectedRole) { showError('Wrong role selected for this account.'); return; }
      setCurrentUser(user);
      window.location.href = user.role === 'admin' ? 'admin.html' : 'store.html';
    } else {
      if (state.users.find(u => u.email === email)) { showError('Email already registered.'); return; }
      const name = document.getElementById('auth-name').value.trim() || 'New User';
      const newUser = { id: Date.now(), name, email, password: pass, role: 'user', joined: new Date().toISOString().split('T')[0] };
      state.users.push(newUser);
      saveState(state);
      setCurrentUser(newUser);
      window.location.href = 'store.html';
    }
  }
</script>
</body>
</html>
