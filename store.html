<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE — Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07); --accent: #c9a96e; --accent2: #e8c992;
    --text: #f0ede8; --muted: #7a7672;
    --success: #4caf7d; --danger: #e05c5c; --warning: #e0a044; --info: #5c9ee0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 4px; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .badge-role { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .badge-user { background: rgba(92,158,224,0.15); color: var(--info); border: 1px solid rgba(92,158,224,0.3); }
  .nav-user { font-size: 13px; color: var(--muted); }
  .nav-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; transition: all .2s; }
  .nav-btn:hover { border-color: var(--danger); color: var(--danger); }
  .cart-btn { position: relative; background: none; border: none; cursor: pointer; color: var(--text); font-size: 18px; }
  .cart-count { position: absolute; top: -6px; right: -8px; background: var(--accent); color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  /* HERO */
  .store-hero { background: linear-gradient(135deg, #0f0d07 0%, #1a150a 50%, #0a0a0a 100%); padding: 80px 32px; text-align: center; position: relative; overflow: hidden; }
  .store-hero::before { content: 'LUXE'; font-family: 'Playfair Display', serif; font-size: 200px; font-weight: 900; color: rgba(201,169,110,0.04); position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; letter-spacing: 20px; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900; line-height: 1.1; margin-bottom: 16px; }
  .hero-title span { color: var(--accent); }
  .hero-sub { color: var(--muted); font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

  /* STORE */
  .store-main { padding: 40px 32px; max-width: 1300px; margin: 0 auto; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 48px; }
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: all .25s; cursor: pointer; }
  .product-card:hover { border-color: rgba(201,169,110,0.3); transform: translateY(-4px); }
  .product-img { height: 200px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; overflow: hidden; }
  .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease; }
  .product-card:hover .product-img img { transform: scale(1.05); }
  .product-img .img-fallback { font-size: 52px; }
  .product-badge { position: absolute; top: 12px; left: 12px; background: var(--accent); color: #000; font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
  .product-info { padding: 16px; }
  .product-cat { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .product-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .product-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .product-footer { display: flex; justify-content: space-between; align-items: center; }
  .product-price { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .add-cart-btn { background: var(--accent); border: none; color: #000; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .add-cart-btn:hover { background: var(--accent2); }
  .search-bar { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 24px; transition: border-color .2s; }
  .search-bar:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all .2s; }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(201,169,110,0.08); }
  .no-products { text-align: center; padding: 60px 0; color: var(--muted); }

  /* ORDERS */
  .orders-section { margin-bottom: 48px; }
  .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
  .order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .order-id { font-size: 13px; font-weight: 500; }
  .order-items-list { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; }
  .order-date { font-size: 12px; color: var(--muted); }
  .order-total { font-weight: 600; color: var(--accent); }
  .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .s-active { background: rgba(76,175,125,0.15); color: var(--success); }
  .s-pending { background: rgba(224,160,68,0.15); color: var(--warning); }
  .s-cancelled { background: rgba(224,92,92,0.15); color: var(--danger); }

  /* CART */
  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
  .cart-overlay.open { display: block; }
  .cart-sidebar { position: fixed; right: 0; top: 0; height: 100vh; width: 380px; background: var(--surface); border-left: 1px solid var(--border); z-index: 151; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s; }
  .cart-sidebar.open { transform: translateX(0); }
  .cart-head { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .cart-head h3 { font-family: 'Playfair Display', serif; font-size: 18px; }
  .cart-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .cart-item-img { width: 50px; height: 50px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .cart-item-price { font-size: 13px; color: var(--accent); }
  .cart-item-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .cart-item-remove:hover { color: var(--danger); }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .qty-btn { width: 22px; height: 22px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .qty-num { font-size: 13px; min-width: 16px; text-align: center; }
  .cart-footer { padding: 20px 24px; border-top: 1px solid var(--border); }
  .cart-total { display: flex; justify-content: space-between; margin-bottom: 16px; }
  .cart-total-label { color: var(--muted); font-size: 13px; }
  .cart-total-val { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--accent); }
  .checkout-btn { width: 100%; padding: 14px; background: var(--accent); border: none; color: #000; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .checkout-btn:hover { background: var(--accent2); }
  .empty-cart { text-align: center; padding: 40px 0; color: var(--muted); }
  .empty-cart .icon { font-size: 48px; margin-bottom: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 13px; z-index: 300; transform: translateY(80px); opacity: 0; transition: all .3s; pointer-events: none; display: flex; align-items: center; gap: 10px; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    .products-grid { grid-template-columns: 1fr 1fr; }
    .cart-sidebar { width: 100%; }
    .hero-title { font-size: 32px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">LUXE</div>
  <div class="nav-right">
    <span class="badge-role badge-user">Customer</span>
    <span class="nav-user" id="user-username"></span>
    <button class="cart-btn" onclick="toggleCart()">🛒<span class="cart-count" id="cart-count">0</span></button>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="store-hero">
  <div class="hero-title">Discover <span>Luxury</span><br>Redefined</div>
  <div class="hero-sub">Curated selections for the discerning buyer</div>
</div>

<div class="store-main">
  <input class="search-bar" id="search-bar" type="text" placeholder="🔍  Search products..." oninput="renderProducts()" />
  <div class="filter-row">
    <button class="filter-chip active" onclick="setFilter('All',this)">All</button>
    <button class="filter-chip" onclick="setFilter('Fashion',this)">Fashion</button>
    <button class="filter-chip" onclick="setFilter('Electronics',this)">Electronics</button>
    <button class="filter-chip" onclick="setFilter('Beauty',this)">Beauty</button>
    <button class="filter-chip" onclick="setFilter('Home',this)">Home</button>
    <button class="filter-chip" onclick="setFilter('Sports',this)">Sports</button>
  </div>
  <div class="section-title">Products</div>
  <div class="products-grid" id="products-grid"></div>
  <div class="orders-section">
    <div class="section-title">My Orders</div>
    <div id="user-orders"></div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-head">
    <h3>Your Cart</h3>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cart-total">$0.00</span></div>
    <button class="checkout-btn" onclick="checkout()">Checkout →</button>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-icon" id="toast-icon">✓</span><span id="toast-msg"></span></div>

<script src="shared.js"></script>
<script>
  const currentUser = requireAuth('user');
  if (currentUser) document.getElementById('user-username').textContent = currentUser.name;

  let activeFilter = 'All';
  let cart = [];

  function renderProducts() {
    const state = getState();
    const q = document.getElementById('search-bar').value.toLowerCase();
    const grid = document.getElementById('products-grid');
    const products = state.products.filter(p =>
      (activeFilter === 'All' || p.category === activeFilter) &&
      (!q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q))
    );
    if (!products.length) {
      grid.innerHTML = '<div class="no-products" style="grid-column:1/-1"><div style="font-size:48px">🔍</div><p>No products found</p></div>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-img">
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="img-fallback" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">📦</span>` : `<span class="img-fallback">📦</span>`}
        </div>
        <div class="product-info">
          <div class="product-cat">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-footer">
            <div class="product-price">$${p.price.toFixed(2)}</div>
            ${p.stock > 0
              ? `<button class="add-cart-btn" onclick="addToCart(${p.id})">Add to Cart</button>`
              : `<span style="font-size:12px;color:var(--danger)">Out of stock</span>`
            }
          </div>
        </div>
      </div>`).join('');
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderProducts();
  }

  function addToCart(id) {
    const state = getState();
    const p = state.products.find(p => p.id === id);
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...p, qty: 1 });
    updateCartUI(); toast(p.name + ' added to cart!', '🛒');
  }

  function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }

  function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeFromCart(id);
    else updateCartUI();
  }

  function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
    const list = document.getElementById('cart-items-list');
    if (!cart.length) {
      list.innerHTML = '<div class="empty-cart"><div class="icon">🛒</div><p>Your cart is empty</p></div>';
      return;
    }
    list.innerHTML = cart.map(i => `
      <div class="cart-item">
        <div class="cart-item-img">${i.image ? `<img src="${i.image}" alt="${i.name}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" onerror="this.parentElement.textContent='📦'">` : '📦'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-price">$${(i.price * i.qty).toFixed(2)}</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
          </div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${i.id})">✕</button>
      </div>`).join('');
  }

  function toggleCart() {
    document.getElementById('cart-sidebar').classList.toggle('open');
    document.getElementById('cart-overlay').classList.toggle('open');
    updateCartUI();
  }

  function checkout() {
    if (!cart.length) { toast('Your cart is empty!', '⚠️'); return; }
    const state = getState();
    const order = {
      id: Date.now(),
      customerId: currentUser.id,
      customerName: currentUser.name,
      items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
      total: cart.reduce((s, i) => s + i.price * i.qty, 0),
      status: 'Processing',
      date: new Date().toLocaleDateString()
    };
    state.orders.push(order);
    saveState(state);
    cart = [];
    updateCartUI();
    document.getElementById('cart-sidebar').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
    renderUserOrders();
    toast('Order placed! 🎉 Processing now.', '✅');
  }

  function renderUserOrders() {
    const state = getState();
    const myOrders = state.orders.filter(o => o.customerId === currentUser?.id).reverse();
    const el = document.getElementById('user-orders');
    el.innerHTML = myOrders.length
      ? myOrders.map(o => `
        <div class="order-card">
          <div class="order-top">
            <span class="order-id">Order #${o.id}</span>
            <span class="status-badge s-${o.status==='Delivered'?'active':o.status==='Processing'?'pending':'cancelled'}">${o.status}</span>
          </div>
          <div class="order-items-list">${o.items.map(i => `${i.name} ×${i.qty}`).join(' · ')}</div>
          <div class="order-footer">
            <span class="order-date">${o.date}</span>
            <span class="order-total">$${o.total.toFixed(2)}</span>
          </div>
        </div>`).join('')
      : '<p style="color:var(--muted);font-size:14px">No orders yet. Start shopping!</p>';
  }

  // Init
  renderProducts();
  renderUserOrders();
</script>
</body>
</html>
